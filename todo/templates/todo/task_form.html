{% extends 'todo/base.html' %}

{% block content %}
<div class="animate-fade-in">
    <div class="glass-card">
        <h2 class="fw-bold mb-4">
            {% if task %}
                <i class="fas fa-pen-nib me-2"></i>Edit Task
            {% else %}
                <i class="fas fa-plus-circle me-2"></i>Create New Task
            {% endif %}
        </h2>

        {% if error %}
        <div class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger mb-4">
            <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label fw-600">Task Title</label>
                <input type="text" name="title" class="form-control form-control-lg" 
                       placeholder="What needs to be done?" 
                       value="{{ title_text }}" autofocus>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-600">Description (Optional)</label>
                <textarea name="description" rows="4" class="form-control" 
                          placeholder="Add some details...">{{ desc_text }}</textarea>
            </div>

            {% if task %}
            <div class="form-check form-switch mb-4">
                <input type="checkbox" name="completed" class="form-check-input" 
                       id="completeSwitch" {% if completed %}checked{% endif %}>
                <label class="form-check-label" for="completeSwitch">Mark as completed</label>
            </div>
            {% endif %}

            <div class="d-flex gap-2 pt-2">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="fas fa-save me-2"></i>Save Task
                </button>
                <a href="{% url 'todo:task_list' %}" class="btn btn-outline-light px-4">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
