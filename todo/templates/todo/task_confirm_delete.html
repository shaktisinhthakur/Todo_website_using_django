{% extends 'todo/base.html' %}

{% block content %}
<div class="animate-fade-in text-center">
    <div class="glass-card mx-auto" style="max-width: 500px;">
        <div class="mb-4">
            <i class="fas fa-exclamation-triangle text-danger fs-1"></i>
        </div>
        <h2 class="fw-bold mb-3">Delete Task?</h2>
        <p class="text-muted mb-4">
            Are you sure you want to delete "<strong>{{ task.title }}</strong>"? This action cannot be undone.
        </p>

        <form method="post" class="d-flex justify-content-center gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4">
                <i class="fas fa-trash-alt me-2"></i>Delete Forever
            </button>
            <a href="{% url 'todo:task_list' %}" class="btn btn-outline-light px-4">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
